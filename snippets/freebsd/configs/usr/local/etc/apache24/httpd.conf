# ==============================================================================
# Apache 2.4 Globale Konfiguration mit PHP-FPM Support
# ==============================================================================
ServerRoot "/usr/local"
PidFile "/var/run/httpd.pid"

# --- MPM-Event-Modul (Standard für moderne, hochperformante Setups mit PHP-FPM) ---
LoadModule mpm_event_module libexec/apache24/mod_mpm_event.so
# LoadModule mpm_prefork_module libexec/apache24/mod_mpm_prefork.so (Inkompatibel mit HTTP/2 & PHP-FPM Performance)
# LoadModule mpm_worker_module libexec/apache24/mod_mpm_worker.so

# --- Standard-Authentifizierung und Autorisierung ---
LoadModule authn_file_module libexec/apache24/mod_authn_file.so
LoadModule authn_core_module libexec/apache24/mod_authn_core.so
LoadModule authz_host_module libexec/apache24/mod_authz_host.so
LoadModule authz_groupfile_module libexec/apache24/mod_authz_groupfile.so
LoadModule authz_user_module libexec/apache24/mod_authz_user.so
LoadModule authz_core_module libexec/apache24/mod_authz_core.so
LoadModule access_compat_module libexec/apache24/mod_access_compat.so
LoadModule auth_basic_module libexec/apache24/mod_auth_basic.so
LoadModule auth_digest_module libexec/apache24/mod_auth_digest.so

# --- System- und Performance-Module ---
LoadModule allowmethods_module libexec/apache24/mod_allowmethods.so
LoadModule cache_module libexec/apache24/mod_cache.so
LoadModule cache_disk_module libexec/apache24/mod_cache_disk.so
LoadModule cache_socache_module libexec/apache24/mod_cache_socache.so
LoadModule socache_shmcb_module libexec/apache24/mod_socache_shmcb.so
LoadModule socache_dbm_module libexec/apache24/mod_socache_dbm.so
LoadModule buffer_module libexec/apache24/mod_buffer.so
LoadModule reqtimeout_module libexec/apache24/mod_reqtimeout.so
LoadModule request_module libexec/apache24/mod_request.so
LoadModule include_module libexec/apache24/mod_include.so
LoadModule filter_module libexec/apache24/mod_filter.so
LoadModule deflate_module libexec/apache24/mod_deflate.so
LoadModule brotli_module libexec/apache24/mod_brotli.so
LoadModule mime_module libexec/apache24/mod_mime.so
LoadModule log_config_module libexec/apache24/mod_log_config.so
LoadModule env_module libexec/apache24/mod_env.so
LoadModule expires_module libexec/apache24/mod_expires.so
LoadModule headers_module libexec/apache24/mod_headers.so
LoadModule unique_id_module libexec/apache24/mod_unique_id.so
LoadModule setenvif_module libexec/apache24/mod_setenvif.so
LoadModule version_module libexec/apache24/mod_version.so

# --- Proxy-Module für PHP-FPM (Zwingend erforderlich) ---
LoadModule remoteip_module libexec/apache24/mod_remoteip.so
LoadModule proxy_module libexec/apache24/mod_proxy.so
LoadModule proxy_fcgi_module libexec/apache24/mod_proxy_fcgi.so

# --- SSL & HTTP/2 Support ---
LoadModule ssl_module libexec/apache24/mod_ssl.so
LoadModule http2_module libexec/apache24/mod_http2.so

# --- Basis-Verzeichnis & System-Sicherheit ---
LoadModule unixd_module libexec/apache24/mod_unixd.so
LoadModule status_module libexec/apache24/mod_status.so
LoadModule autoindex_module libexec/apache24/mod_autoindex.so
LoadModule info_module libexec/apache24/mod_info.so

<IfModule !mpm_prefork_module>
    LoadModule cgid_module libexec/apache24/mod_cgid.so
</IfModule>
<IfModule mpm_prefork_module>
    LoadModule cgi_module libexec/apache24/mod_cgi.so
</IfModule>

LoadModule negotiation_module libexec/apache24/mod_negotiation.so
LoadModule dir_module libexec/apache24/mod_dir.so
LoadModule alias_module libexec/apache24/mod_alias.so
LoadModule rewrite_module libexec/apache24/mod_rewrite.so

IncludeOptional "etc/apache24/modules.d/[0-9][0-9][0-9]_*.conf"

# ==============================================================================
# MPM EVENT EINSTELLUNGEN (Optimiert für moderne Server)
# ==============================================================================
<IfModule mpm_event_module>
    StartServers             16
    ServerLimit              64
    ThreadsPerChild          64
    ThreadLimit             128
    MinSpareThreads         128
    MaxSpareThreads         256
    MaxRequestWorkers      1024
    MaxConnectionsPerChild 5000
</IfModule>

# ==============================================================================
# HTTP/2 EINSTELLUNGEN
# ==============================================================================
<IfModule http2_module>
    Protocols h2 http/1.1
    ProtocolsHonorOrder On
    H2Padding 2
    H2EarlyHints On
</IfModule>

<IfModule unixd_module>
    User www
    Group www
</IfModule>

<IfDefine NOHTTPACCEPT>
   AcceptFilter http none
   AcceptFilter https none
</IfDefine>

TraceEnable Off
HttpProtocolOptions Strict LenientMethods Require1.0

# ==============================================================================
# LOGGING
# ==============================================================================
<IfModule log_config_module>
    <IfModule logio_module>
        LogFormat "%v %a %h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" %I %O" combinedio
    </IfModule>
    LogFormat "%v %a %h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
    LogFormat "%v %a %h %l %u %t \"%r\" %>s %b" common

    <IfModule ssl_module>
        <IfModule logio_module>
            LogFormat "%v %a %h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" %I %O %{SSL_PROTOCOL}x %{SSL_CIPHER}x" combinediossl
        </IfModule>
        LogFormat "%v %a %h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" %{SSL_PROTOCOL}x %{SSL_CIPHER}x" combinedssl
        LogFormat "%v %a %h %l %u %t \"%r\" %>s %b %{SSL_PROTOCOL}x %{SSL_CIPHER}x" commonssl
        CustomLog "/var/log/httpd-access-ssl.log" combinedssl
    </IfModule>
    <IfModule !ssl_module>
        CustomLog "/var/log/httpd-access.log" combined
    </IfModule>
</IfModule>

ErrorLog "/var/log/httpd-error.log"

Listen 80
<IfModule ssl_module>
    Listen 443
</IfModule>

# ==============================================================================
# VERBINDUNGS-TIMEOUTS
# ==============================================================================
Timeout 60
KeepAlive On
KeepAliveTimeout 2
MaxKeepAliveRequests 500

UseCanonicalName Off
HostnameLookups Double

ServerTokens Prod
ServerSignature Off

ServerName localhost
ServerAdmin webmaster@example.com

AccessFileName .htaccess
AllowEncodedSlashes NoDecode
AddDefaultCharset UTF-8

EnableMMAP off
EnableSendfile off

# ==============================================================================
# SICHERHEITS-RESTRIKTIONEN
# ==============================================================================
<Directory "/">
    <IfModule allowmethods_module>
        AllowMethods GET POST OPTIONS
    </IfModule>
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all denied
</Directory>

<IfModule alias_module>
    Alias "/error/" "/usr/local/www/apache24/error/"
</IfModule>

<Directory "/usr/local/www/apache24/error">
    Options None +FollowSymLinks +IncludesNoExec
    AllowOverride None
    AddOutputFilter Includes html
    AddHandler type-map var
    Require all granted
    LanguagePriority de en cs es fr it ja ko nl pl pt-br ro sv tr
    ForceLanguagePriority Prefer Fallback
</Directory>

<IfModule alias_module>
    Alias "/icons/" "/usr/local/www/apache24/icons/"
</IfModule>

<Directory "/usr/local/www/apache24/icons">
    Options None +FollowSymLinks +MultiViews
    AllowOverride None
    Require all granted
</Directory>

<IfModule alias_module>
    Alias "/.well-known/acme-challenge/" "/usr/local/www/.well-known/acme-challenge/"
</IfModule>

<Directory "/usr/local/www/.well-known/acme-challenge/">
    Options None
    AllowOverride None
    Require all granted
</Directory>

# Blockiert versteckte Dateien (außer .well-known für ACME/LetsEncrypt)
<LocationMatch "^/(?!\.well-known(?:/|$))(?:.+/)*[._]">
    Require all denied
</LocationMatch>

<IfModule reqtimeout_module>
    RequestReadTimeout handshake=0 header=20-40,MinRate=500 body=20,MinRate=500
</IfModule>

FileETag None

<IfModule dir_module>
    DirectoryIndex index.php index.html index.htm main.php
</IfModule>

<IfModule cgi_module>
    <FilesMatch "\.(?:cgi|pl|py|rb)$">
        SetHandler cgi-script
    </FilesMatch>
</IfModule>
<IfModule cgid_module>
    <FilesMatch "\.(?:cgi|pl|py|rb)$">
        SetHandler cgi-script
    </FilesMatch>
    Scriptsock "/var/run/cgisock"
</IfModule>

# ==============================================================================
# MIME TYPES
# ==============================================================================
<IfModule mime_module>
    TypesConfig "etc/apache24/mime.types"

    AddType application/gzip              gz tgz
    AddType application/ld+json           jsonld
    AddType application/manifest+json     manifest
    AddType text/html                     shtml
    AddType text/javascript               js
    AddType application/javascript        js
    AddType text/ecmascript               ecma
    AddType text/markdown                 md

    <FilesMatch "favicon\.ico$">
        AddType image/vnd.microsoft.icon  ico
    </FilesMatch>

    AddEncoding gzip                      svgz
    AddHandler type-map                   var

    <IfModule negotiation_module>
        AddLanguage de                    .de
        AddLanguage en                    .en
        DefaultLanguage en
        LanguagePriority en de
        ForceLanguagePriority Prefer Fallback

        AddCharset us-ascii               .us-ascii .ascii
        AddCharset ISO-8859-1             .iso8859-1 .latin1
        AddCharset ISO-8859-15            .iso8859-15 .latin9
        AddCharset UTF-8                  .utf8
        AddCharset UTF-8                  .atom .css .js .json .jsonld .md .manifest .rdf .rss .xml .xsl
    </IfModule>

    <IfModule include_module>
        AddOutputFilter INCLUDES .shtml
    </IfModule>
</IfModule>

<IfModule mime_magic_module>
    MIMEMagicFile "etc/apache24/magic"
</IfModule>

# ==============================================================================
# PHP-FPM GLOBAL BINDING
# ==============================================================================
<IfModule proxy_fcgi_module>
    ProxyFCGIBackendType FPM
    ProxyTimeout 60
    <FilesMatch "(.+\.php)(/.*)?$">
        <If "-f %{REQUEST_FILENAME}">
            SetHandler "proxy:unix:/var/run/fpm_www.sock|fcgi://localhost"
        </If>
    </FilesMatch>
</IfModule>

# ErrorDocuments
ErrorDocument 400 /error/HTTP_BAD_REQUEST.html.var
ErrorDocument 401 /error/HTTP_UNAUTHORIZED.html.var
ErrorDocument 403 /error/HTTP_FORBIDDEN.html.var
ErrorDocument 404 /error/HTTP_NOT_FOUND.html.var
ErrorDocument 405 /error/HTTP_METHOD_NOT_ALLOWED.html.var
ErrorDocument 408 /error/HTTP_REQUEST_TIME_OUT.html.var
ErrorDocument 410 /error/HTTP_GONE.html.var
ErrorDocument 411 /error/HTTP_LENGTH_REQUIRED.html.var
ErrorDocument 412 /error/HTTP_PRECONDITION_FAILED.html.var
ErrorDocument 413 /error/HTTP_REQUEST_ENTITY_TOO_LARGE.html.var
ErrorDocument 414 /error/HTTP_REQUEST_URI_TOO_LARGE.html.var
ErrorDocument 415 /error/HTTP_UNSUPPORTED_MEDIA_TYPE.html.var
ErrorDocument 500 /error/HTTP_INTERNAL_SERVER_ERROR.html.var
ErrorDocument 501 /error/HTTP_NOT_IMPLEMENTED.html.var
ErrorDocument 502 /error/HTTP_BAD_GATEWAY.html.var
ErrorDocument 503 /error/HTTP_SERVICE_UNAVAILABLE.html.var
ErrorDocument 506 /error/HTTP_VARIANT_ALSO_VARIES.html.var

IndexOptions FancyIndexing HTMLTable VersionSort

# ==============================================================================
# EXPIRES CACHING (Optimiert für Core Web Vitals)
# ==============================================================================
<IfModule expires_module>
    ExpiresActive On
    ExpiresDefault                          "access plus 1 month"
    ExpiresByType text/html                 "access plus 0 seconds"
    ExpiresByType application/xhtml+xml     "access plus 0 seconds"
    ExpiresByType text/css                  "access plus 1 week"
    ExpiresByType text/javascript           "access plus 1 week"
    ExpiresByType application/javascript    "access plus 1 week"
    ExpiresByType text/ecmascript           "access plus 1 week"
    ExpiresByType application/ecmascript    "access plus 1 week"
    ExpiresByType text/markdown             "access plus 0 seconds"
    ExpiresByType application/xml           "access plus 0 seconds"
    ExpiresByType text/xml                  "access plus 0 seconds"
    ExpiresByType text/xsl                  "access plus 0 seconds"
    ExpiresByType application/atom+xml      "access plus 1 hour"
    ExpiresByType application/rss+xml       "access plus 1 hour"
    ExpiresByType application/rdf+xml       "access plus 1 hour"
    ExpiresByType application/json          "access plus 0 seconds"
    ExpiresByType application/ld+json       "access plus 0 seconds"
    ExpiresByType application/schema+json   "access plus 0 seconds"
    ExpiresByType application/manifest+json "access plus 1 week"
    ExpiresByType image/vnd.microsoft.icon  "access plus 1 week"
</IfModule>

# ==============================================================================
# BROTLI & DEFLATE KOMPRESSION
# ==============================================================================
<IfModule filter_module>
    <IfModule deflate_module>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript text/ecmascript text/markdown application/javascript application/ecmascript application/json application/ld+json application/schema+json application/manifest+json application/xml application/xhtml+xml application/rss+xml application/atom+xml image/svg+xml image/vnd.microsoft.icon
    </IfModule>

    <IfModule brotli_module>
        AddOutputFilterByType BROTLI_COMPRESS text/html text/plain text/xml text/css text/javascript text/ecmascript text/markdown application/javascript application/ecmascript application/json application/ld+json application/schema+json application/manifest+json application/xml application/xhtml+xml application/rss+xml application/atom+xml image/svg+xml image/vnd.microsoft.icon
    </IfModule>
</IfModule>

# ==============================================================================
# CACHING-MODULE KONFIGURATION
# ==============================================================================
<IfModule cache_module>
    CacheQuickHandler Off
    CacheStorePrivate On
    CacheIgnoreNoLastMod On
    CacheIgnoreURLSessionIdentifiers sid SID
    CacheHeader On
    <IfModule cache_disk_module>
        CacheRoot "/usr/local/www/cache/"
    </IfModule>
    <IfModule cache_socache_module>
        CacheSocache shmcb
    </IfModule>
</IfModule>

# Status & Info (Restriktiert auf Localhost)
<IfModule info_module>
    <Location "/.well-known/server-info">
        SetHandler server-info
        Require local
    </Location>
</IfModule>

<IfModule status_module>
    ExtendedStatus On
    <Location "/.well-known/server-status">
        SetHandler server-status
        Require local
    </Location>

    <IfModule http2_module>
        <Location "/.well-known/server-status2">
            SetHandler http2-status
            Require local
        </Location>
    </IfModule>
</IfModule>

# ==============================================================================
# GLOBALE SICHERHEITS-HEADER
# ==============================================================================
<IfModule headers_module>
    RequestHeader unset Proxy early
    Header set Access-Control-Allow-Methods "GET, POST, OPTIONS"
    <IfModule setenvif_module>
        SetEnvIf Origin ":" IS_CORS
        Header set Access-Control-Allow-Origin "*" env=IS_CORS
    </IfModule>
    Header set Access-Control-Max-Age "600"

    # Modernes CSP-Setup
    Header set Content-Security-Policy "\
upgrade-insecure-requests; \
default-src 'self'; \
child-src 'self'; \
connect-src 'self' https:; \
font-src 'self' https:; \
frame-src 'self'; \
fenced-frame-src 'self'; \
img-src 'self' https: data:; \
manifest-src 'self'; \
media-src 'self' https: data:; \
object-src 'none'; \
script-src 'self' https: 'unsafe-inline' 'unsafe-eval' 'report-sample'; \
style-src 'self' https: 'unsafe-inline' 'unsafe-eval' 'report-sample'; \
webrtc-src 'block'; \
worker-src 'self'; \
form-action 'self' https:; \
frame-ancestors 'self'; \
base-uri 'self'; \
report-uri https://www.example.com/default-endpoint.php; \
report-to default-endpoint"

    Header set Cross-Origin-Opener-Policy "same-origin-allow-popups; report-uri https://www.example.com/default-endpoint.php; report-to=\"default-endpoint\""
    Header set Cross-Origin-Embedder-Policy "credentialless; report-uri https://www.example.com/default-endpoint.php; report-to=\"default-endpoint\""
    Header set Cross-Origin-Resource-Policy "cross-origin; report-uri https://www.example.com/default-endpoint.php; report-to=\"default-endpoint\""
    Header set No-Vary-Search "key-order"

    # Modernisierte Permissions-Policy
    Header Set Permissions-Policy "\
accelerometer=(self), \
ambient-light-sensor=(self), \
attribution-reporting=(self), \
autoplay=(self), \
bluetooth=(self), \
browsing-topics=(self), \
camera=(self), \
compute-pressure=(self), \
cross-origin-isolated=(self), \
display-capture=(self), \
encrypted-media=(self), \
fullscreen=(self), \
gamepad=(self), \
geolocation=(self), \
gyroscope=(self), \
hid=(self), \
identity-credentials-get=(self), \
idle-detection=(self), \
local-fonts=(self), \
magnetometer=(self), \
microphone=(self), \
midi=(self), \
otp-credentials=(self), \
payment=(self), \
picture-in-picture=(self), \
publickey-credentials-create=(self), \
publickey-credentials-get=(self), \
screen-wake-lock=(self), \
serial=(self), \
speaker-selection=(self), \
storage-access=(self), \
usb=(self), \
window-management=(self), \
xr-spatial-tracking=(self), \
sync-xhr=(self), \
vibrate=(self)"

    Header set Referrer-Policy "strict-origin-when-cross-origin"
    Header set Reporting-Endpoints "default-endpoint=\"https://www.example.com/default-endpoint.php\""
    Header set Timing-Allow-Origin "*"
    Header set X-Content-Type-Options "nosniff"
    Header set X-DNS-Prefetch-Control "on"
    Header set X-Download-Options "noopen"
    Header set X-Frame-Options "SAMEORIGIN"
    Header set X-Permitted-Cross-Domain-Policies "none"
    Header set X-Robots-Tag "noai, noarchive, noimageindex, max-snippet:-1, max-image-preview:standard, max-video-preview:standard"

    <FilesMatch "(.+\.(ico|gif|jpg|png|webp|svg|css|js|json|xml|pdf|woff|woff2).?)(/.*)?$">
        Header set X-Robots-Tag "noai, noarchive, noindex, noimageindex, nofollow, max-snippet:-1, max-image-preview:standard, max-video-preview:standard"
    </FilesMatch>
</IfModule>

# ==============================================================================
# VIRTUAL HOSTS (Port 80 - Weiterleitung zu HTTPS)
# ==============================================================================
IncludeOptional "etc/apache24/vhosts.conf"

# ==============================================================================
# SSL & TLS KONFIGURATION (Modern & Sicher)
# ==============================================================================
<IfModule ssl_module>
    SSLRandomSeed startup "file:/dev/urandom" 65536
    SSLRandomSeed connect "file:/dev/urandom" 65536
    SSLPassPhraseDialog builtin

    <IfModule socache_shmcb_module>
        SSLSessionCache "shmcb:/var/run/ssl_scache(512000)"
    </IfModule>
    <IfModule !socache_shmcb_module>
        <IfModule socache_dbm_module>
            SSLSessionCache "dbm:/var/run/ssl_scache"
        </IfModule>
        <IfModule !socache_dbm_module>
            SSLSessionCache "nonenotnull"
        </IfModule>
    </IfModule>

    SSLHonorCipherOrder On
    SSLStrictSNIVHostCheck On
    SSLSessionTickets Off

    # Ausschließlich TLSv1.2 und TLSv1.3 (Sicherheitsstandard 2026)
    SSLProtocol -ALL +TLSv1.2 +TLSv1.3
    SSLCipherSuite "ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256"
    SSLCipherSuite TLSv1.3 "TLS_CHACHA20_POLY1305_SHA256:TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256"

    SSLProxyProtocol -ALL +TLSv1.2 +TLSv1.3
    SSLProxyCipherSuite "ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256"
    SSLProxyCipherSuite TLSv1.3 "TLS_CHACHA20_POLY1305_SHA256:TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256"

    SSLOpenSSLConfCmd Curves "X448:X25519:secp384r1:prime256v1:secp521r1"
    SSLOptions +StrictRequire +StdEnvVars

    SSLOCSPEnable Off
    SSLStaplingFakeTryLater Off
    SSLStaplingResponderTimeout 2
    SSLStaplingReturnResponderErrors Off
    SSLStaplingStandardCacheTimeout 86400

    <IfModule socache_shmcb_module>
        SSLUseStapling On
        SSLStaplingCache "shmcb:/var/run/stapling_cache(128000000)"
    </IfModule>
    <IfModule !socache_shmcb_module>
        <IfModule socache_dbm_module>
            SSLUseStapling On
            SSLStaplingCache "dbm:/var/run/stapling_cache"
        </IfModule>
        <IfModule !socache_dbm_module>
            SSLUseStapling Off
        </IfModule>
    </IfModule>

    IncludeOptional "etc/apache24/vhosts-ssl.conf"
</IfModule>

# ==============================================================================
# COOKIE, CACHE & SESSION OPTIMIERUNGEN (Header Manipulationen)
# ==============================================================================
<IfModule headers_module>
    Header set tdm-reservation "1"
    Header set Cache-Control "private, no-cache, no-transform, must-revalidate"

    # Cookie-Sicherheitsanpassungen (Hocheffiziente Negative Lookaheads)
    # Fügt HttpOnly hinzu, sofern das Flag nicht bereits im Cookie existiert
    Header always edit Set-Cookie "^(?!.*(?i:HttpOnly)).*$" "$0; HttpOnly"

    # Fügt SameSite=Lax hinzu, sofern nicht bereits ein SameSite-Flag gesetzt wurde
    Header always edit Set-Cookie "^(?!.*(?i:SameSite)).*$" "$0; SameSite=Lax"

    # Fügt Secure hinzu, sofern nicht vorhanden, aber NUR wenn die Verbindung über HTTPS läuft
    <If "%{SSL:HTTPS} =~ /\bOn\b/i">
        Header set Strict-Transport-Security "max-age=31536000; includeSubdomains; preload"
        Header set X-SSL-PROTOCOL "expr=%{SSL_PROTOCOL}"
        Header set X-SSL-CIPHER "expr=%{SSL:SSL_CIPHER}"

        Header always edit Set-Cookie "^(?!.*(?i:Secure)).*$" "$0; Secure"
    </If>

    Header unset Pragma
    Header unset ETag
    Header always unset Pragma
    Header always unset ETag
</IfModule>