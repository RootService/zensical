<VirtualHost *:443>
    ServerName mail.example.com
    ServerAdmin webmaster@example.com
    Protocols h2 http/1.1

    CustomLog "/usr/local/www/vhosts/mail.example.com/logs/apache_ssl_access_log" combinedssl
    ErrorLog  "/usr/local/www/vhosts/mail.example.com/logs/apache_ssl_error_log"

    DocumentRoot "/usr/local/www/vhosts/mail.example.com/data"

    <Directory "/usr/local/www/vhosts/mail.example.com/data">
        Options None +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <IfModule alias_module>
        ScriptAlias "/postfixadmin/" "/usr/local/www/apps/postfixadmin/public/"
    </IfModule>

    <Directory "/usr/local/www/apps/postfixadmin/public">
        Options None +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <LocationMatch "^/?(?:postfixadmin)/">
        FallbackResource "/postfixadmin/mail.php"
    </LocationMatch>

    <IfModule rewrite_module>
        RewriteEngine On
        RewriteCond "%{HTTP_HOST}" "!^mail\.example\.com$" [NC]
        RewriteCond "%{REQUEST_URI}" "!^/?(?:\.well-known|robots\.txt)" [NC]
        RewriteRule "^/?(.*)" "https://mail.example.com%{REQUEST_URI}" [L,QSA,R=308,NE]
    </IfModule>

    <FilesMatch "(.+\.php)(/.*)?$">
        <If "-f %{REQUEST_FILENAME}">
            SetHandler "proxy:unix:/var/run/fpm_www.sock|fcgi://localhost"
        </If>
    </FilesMatch>

    SSLEngine On
    SSLCertificateFile    "/usr/local/etc/letsencrypt/live/mail.example.com/fullchain.pem"
    SSLCertificateKeyFile "/usr/local/etc/letsencrypt/live/mail.example.com/privkey.pem"
</VirtualHost>