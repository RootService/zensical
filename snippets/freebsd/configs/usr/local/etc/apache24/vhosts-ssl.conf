<VirtualHost *:443>
    ServerName devnull.example.com
    ServerAdmin webmaster@example.com
    Protocols h2 http/1.1

    CustomLog "/usr/local/www/vhosts/0default0/logs/apache_ssl_access_log" combinedssl
    ErrorLog  "/usr/local/www/vhosts/0default0/logs/apache_ssl_error_log"

    DocumentRoot "/usr/local/www/vhosts/0default0/data"

    <Directory "/usr/local/www/vhosts/0default0/data">
        Options None +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <IfModule rewrite_module>
        RewriteEngine On
        RewriteCond "%{HTTP_HOST}" "!^devnull\.example\.com$" [NC]
        RewriteCond "%{REQUEST_URI}" "!^/?(?:\.well-known|robots\.txt)" [NC]
        RewriteRule "^/?(.*)" "https://www.example.com%{REQUEST_URI}" [L,QSA,R=308,NE]
    </IfModule>

    <FilesMatch "(.+\.php)(/.*)?$">
        <If "-f %{REQUEST_FILENAME}">
            SetHandler "proxy:unix:/var/run/fpm_www.sock|fcgi://localhost"
        </If>
    </FilesMatch>

    SSLEngine On
    SSLCertificateFile    "/usr/local/etc/letsencrypt/live/devnull.example.com/fullchain.pem"
    SSLCertificateKeyFile "/usr/local/etc/letsencrypt/live/devnull.example.com/privkey.pem"
</VirtualHost>

