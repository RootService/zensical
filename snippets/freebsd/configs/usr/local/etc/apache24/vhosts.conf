<VirtualHost 127.0.0.1:80>
    ServerName localhost
    ServerAdmin webmaster@example.com

    DocumentRoot "/usr/local/www/apache24/data"

    <Directory "/usr/local/www/apache24/data">
        Options None +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <IfModule alias_module>
        ScriptAlias "/cgi-bin/" "/usr/local/www/apache24/cgi-bin/"
    </IfModule>

    <Directory "/usr/local/www/apache24/cgi-bin">
        Options None
        AllowOverride None
        Require all denied
    </Directory>
</VirtualHost>

<VirtualHost *:80>
    ServerName devnull.example.com
    ServerAdmin webmaster@example.com

    CustomLog "/usr/local/www/vhosts/0default0/logs/apache_access_log" combined
    ErrorLog  "/usr/local/www/vhosts/0default0/logs/apache_error_log"

    DocumentRoot "/usr/local/www/vhosts/0default0/data"

    <Directory "/usr/local/www/vhosts/0default0/data">
        Options None +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <IfModule rewrite_module>
        RewriteEngine On
        RewriteCond "%{HTTP_HOST}" "!^devnull\.example\.com$" [NC]
        RewriteCond "%{REQUEST_URI}" "!^/?(?:\.well-known|robots\.txt)" [NC]
        RewriteRule "^/?(.*)" "https://%{HTTP_HOST}/$1" [L,QSA,R=308,NE]
    </IfModule>
</VirtualHost>

<VirtualHost *:80>
    ServerName www.example.com
    ServerAlias example.com
    ServerAdmin webmaster@example.com

    CustomLog "/usr/local/www/vhosts/www.example.com/logs/apache_access_log" combined
