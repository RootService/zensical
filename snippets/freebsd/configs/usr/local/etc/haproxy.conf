global
    log /var/run/log local0 info
    chroot /var/empty
    daemon
    master-worker
    stats socket /var/run/haproxy.sock mode 660 level admin expose-fd listeners
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11
    ssl-default-bind-ciphers ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
    ssl-default-bind-ciphersuites TLS_CHACHA20_POLY1305_SHA256:TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256
defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    timeout http-request    20s
    timeout connect          5s
    timeout client          60s
    timeout server          60s
    timeout http-keep-alive  2s
frontend fe_http
    bind :8080 v4v6
    acl acme       path_beg /.well-known/acme-challenge/
    acl host_apex  hdr(host) -i example.com
    acl host_www   hdr(host) -i www.example.com
    acl host_mail  hdr(host) -i mail.example.com
    acl host_dev   hdr(host) -i devnull.example.com
    http-request redirect code 308 location https://www.example.com%[capture.req.uri] if host_apex
    http-request redirect code 308 scheme https if host_www or host_mail or host_dev
    http-request redirect code 308 location https://devnull.example.com%[capture.req.uri]
    use_backend be_nginx if acme

frontend fe_https
    bind :8443 v4v6 ssl crt-list /usr/local/etc/letsencrypt/certs/crt-list.txt alpn h2,http/1.1
    acl host_apex hdr(host) -i example.com
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-Port 8443
    http-request redirect code 308 location https://www.example.com%[capture.req.uri] if host_apex
    http-after-response set-header Strict-Transport-Security "max-age=31536000"
    default_backend be_nginx
backend be_nginx
    server nginx1 127.0.0.1:8080 check
listen stats_local
    bind 127.0.0.1:8404
    mode http
    stats enable
    stats hide-version
    stats uri /.well-known/haproxy-stats
    stats refresh 10s