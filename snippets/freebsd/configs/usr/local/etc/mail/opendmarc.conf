AuthservID mail.example.com
AutoRestart true
AutoRestartRate 10/1h
BaseDirectory /var/run/opendmarc
FailureReports true
FailureReportsBcc dmarc@example.com
FailureReportsOnNone true
FailureReportsSentBy postmaster@example.com
HistoryFile /var/db/opendmarc/opendmarc.dat
IgnoreHosts /var/db/opendmarc/ignorehosts
MacroList daemon_name|VERIFYING
PidFile /var/run/opendmarc/opendmarc.pid
PublicSuffixList /usr/local/share/public_suffix_list/public_suffix_list.dat
RejectFailures false
RequiredHeaders true
#Socket inet:8895@localhost
Socket local:/var/run/opendmarc/opendmarc.sock
SPFIgnoreResults true
SPFSelfValidate true
Syslog true
SyslogFacility mail
TrustedAuthservIDs mail.example.com
UMask 022
UserID mailnull:mailnull